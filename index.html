<!DOCTYPE html>
<html>
<head>
  <title>My Game</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background-color: lightblue;
    }

    h1 {
      color: darkblue;
    }

    #box {
      width: 100px;
      height: 100px;
      background-color: red;
      position: absolute;
      top: 200px;
      left: 200px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1>🎮 Click the Box Game</h1>
  <h2>Score: <span id="score">0</span></h2>

  <div id="box"></div>

  <script>
    let score = 0;
    let box = document.getElementById("box");

    box.onclick = function() {
      score++;
      document.getElementById("score").innerText = score;

      // Move box randomly
      let x = Math.random() * 300;
      let y = Math.random() * 300;

      box.style.left = x + "px";
      box.style.top = y + "px";
    };
  </script>

</body>
</html>
