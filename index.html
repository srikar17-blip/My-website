<!DOCTYPE html>
<html>
<head>
    <title>My Game 🎮</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            background-color: #222;
            color: white;
        }
        button {
            padding: 20px;
            font-size: 20px;
            background-color: orange;
            border: none;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<h1>🎮 Click Game</h1>
<p>Score: <span id="score">0</span></p>

<button onclick="increaseScore()">Click Me!</button>

<script>
    let score = 0;

    function increaseScore() {
        score++;
        document.getElementById("score").innerText = score;
    }
</script>

</body>
</html>
